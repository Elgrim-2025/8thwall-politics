<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AR Tap to Place Video</title>

  <!-- xr.js 안에 AFRAME + XR8 + xrweb 포함 -->
  <script src="./external/xr/xr.js" data-preload-chunks="slam"></script>
  <!-- 크로마키 셰이더 (xr.js / AFRAME 이후 로드) -->
  <script src="//unpkg.com/aframe-chromakey-material@1.1.4/dist/aframe-chromakey-material.min.js"></script>
  <!-- 커스텀 AR 로직 -->
  <script src="./tap-place-video.js"></script>

  <meta name="8thwall:renderer" content="aframe:1.5.0"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    .over {
      z-index: 10;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      text-align: center;
      color: white;
      font-family: monospace;
      text-shadow: 0 0 6px black;
    }
    #promptText {
      font-size: 1.8em;
      bottom: 12vh;
      position: absolute;
      left: 50%;
      transform: translate(-50%, 0);
      background: rgba(0,0,0,0.4);
      padding: 6px 16px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="over">
    <span id="promptText">화면을 탭해서 배치</span>
  </div>

  <a-scene
    renderer="colorManagement:true"
    xrweb="allowedDevices:any">

    <a-assets>
      <video
        id="chromaVideo"
        src="assets/example-final.mp4"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
        preload="auto"
        style="display:none">
      </video>
    </a-assets>

    <a-camera
      id="camera"
      position="0 8 8"
      raycaster="objects: .cantap"
      cursor="fuse:false; rayOrigin:mouse">
    </a-camera>

    <a-entity
      light="type:directional; intensity:0.8; castShadow:true"
      position="5 10 5">
    </a-entity>

    <a-light type="ambient" intensity="0.5"></a-light>

    <!-- 보이지 않는 지면: AR 지면 탭 감지 -->
    <a-box
      id="ground"
      class="cantap"
      scale="1000 2 1000"
      position="0 -0.99 0"
      material="shader:flat; transparent:true; opacity:0.0"
      visible="true">
    </a-box>

  </a-scene>
</body>
</html>
